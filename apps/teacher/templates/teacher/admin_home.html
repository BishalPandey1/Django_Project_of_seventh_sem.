{% extends "layouts/app.html" %}

{% block app_title %}Admin · MathViz{% endblock %}

{% block app_content %}
    <h1 class="mb-4 text-2xl font-bold tracking-tight text-foreground">Admin panel</h1>
    <div class="glass rounded-xl p-5">
        <table class="w-full text-sm">
            <thead>
                <tr class="text-left text-xs uppercase tracking-wider text-muted-foreground">
                    <th class="px-3 py-2">User</th>
                    <th class="px-3 py-2">Email</th>
                    <th class="px-3 py-2">Role</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                    <tr class="border-t border-border">
                        <td class="px-3 py-2 font-medium">{{ u.username }}</td>
                        <td class="px-3 py-2 text-xs text-muted-foreground">{{ u.email|default:"—" }}</td>
                        <td class="px-3 py-2">
                            <form method="post" action="{% url 'teacher:change_role' u.id %}" class="flex items-center gap-2">
                                {% csrf_token %}
                                <select name="role" class="rounded-md border border-input bg-background px-2 py-1 text-xs">
                                    <option value="student" {% if u.userprofile.role == "student" %}selected{% endif %}>Student</option>
                                    <option value="teacher" {% if u.userprofile.role == "teacher" %}selected{% endif %}>Teacher</option>
                                    <option value="admin"   {% if u.userprofile.role == "admin"   %}selected{% endif %}>Admin</option>
                                </select>
                                <button type="submit" class="rounded-md bg-primary px-2 py-1 text-xs font-semibold text-primary-foreground">Save</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
