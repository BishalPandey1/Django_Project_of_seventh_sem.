{% extends "layouts/app.html" %}

{% block app_title %}Review · Teacher{% endblock %}

{% block app_content %}
    <h1 class="mb-4 text-2xl font-bold tracking-tight text-foreground">Review submissions</h1>
    <div class="space-y-3">
        {% for s in subs %}
            <form method="post" action="{% url 'teacher:grade' s.id %}" class="glass space-y-2 rounded-xl p-4 text-sm">
                {% csrf_token %}
                <p class="font-semibold">{{ s.task.title }} — {{ s.student.username }}</p>
                <pre class="whitespace-pre-wrap rounded-md bg-muted/40 p-2 text-xs">{{ s.answer }}</pre>
                <div class="flex flex-wrap items-center gap-2">
                    <label class="text-xs">Score
                        <input type="number" name="score" min="0" max="100" class="ml-1 w-16 rounded-md border border-input bg-background px-2 py-1 font-mono text-xs">
                    </label>
                    <input type="text" name="feedback" placeholder="Feedback" class="flex-1 rounded-md border border-input bg-background px-2 py-1 text-xs">
                    <button type="submit" class="rounded-md bg-primary px-3 py-1 text-xs font-semibold text-primary-foreground hover-elevate">Mark reviewed</button>
                </div>
            </form>
        {% empty %}
            <p class="text-sm text-muted-foreground">Nothing to review.</p>
        {% endfor %}
    </div>
{% endblock %}
