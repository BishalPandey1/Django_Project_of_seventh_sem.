<header class="glass-header sticky top-0 z-30">
    <nav class="mx-auto flex h-16 max-w-7xl items-center gap-3 px-3 sm:px-6 lg:px-8">

        <button id="sidebar-toggle"
                type="button"
                aria-label="Open navigation menu"
                aria-controls="app-sidebar"
                aria-expanded="false"
                class="inline-flex h-10 w-10 shrink-0 items-center justify-center
                       rounded-lg border border-border bg-card/60 text-foreground
                       hover:bg-muted transition-colors
                       focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2
                       focus:ring-offset-background">
            <span class="sr-only">Toggle menu</span>
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 6h18M3 12h18M3 18h18"></path>
            </svg>
        </button>

        <a href="{% url 'home' %}" class="flex items-center gap-2.5 group shrink-0">
            <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl
                         bg-primary text-primary-foreground font-bold shadow-sm
                         transition-transform duration-300 group-hover:scale-105">
                M
            </span>
            <span class="hidden text-base font-semibold tracking-tight text-foreground sm:inline">
                MathViz
            </span>
        </a>

        <div class="hidden flex-1 max-w-md mx-2 md:block">
            <label class="relative block">
                <span class="sr-only">Search</span>
                <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-muted-foreground">
                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </span>
                <input type="search"
                       placeholder="Search tools, concepts, lessons…"
                       class="block w-full rounded-full border border-input bg-card/60
                              py-2 pl-9 pr-4 text-sm text-foreground
                              placeholder:text-muted-foreground
                              focus:outline-none focus:ring-2 focus:ring-ring
                              focus:border-transparent transition" />
            </label>
        </div>

        <div class="ml-auto flex items-center gap-2">
            {% if user.is_authenticated %}
                <span class="hidden text-sm text-muted-foreground sm:inline">{{ user.username }}</span>
                <a href="{% url 'accounts:logout' %}"
                   class="hidden rounded-lg border border-border bg-background/50 px-3 py-2
                          text-sm font-medium text-foreground hover:bg-muted
                          transition-colors sm:inline-flex">
                    Logout
                </a>
            {% else %}
                <a href="{% url 'accounts:login' %}"
                   class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold
                          text-primary-foreground shadow-sm hover:shadow-md
                          transition-all duration-200">
                    Sign in
                </a>
            {% endif %}
        </div>
    </nav>
</header>
