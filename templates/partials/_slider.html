{% load static %}
<div class="input-card"
     style="--input-accent: {{ color|default:'#6366f1' }}"
     data-input-card data-input-name="{{ name }}">
    <div class="input-card-head">
        <div class="min-w-0 flex-1">
            <div class="input-card-label">
                <span class="input-card-dot"></span>
                <span class="truncate">{{ label }}</span>
                {% if formula %}
                    <span class="input-card-formula ml-1">· {{ formula }}</span>
                {% endif %}
            </div>
        </div>
        <input type="number"
               name="{{ name }}"
               value="{{ value }}"
               step="{{ step }}"
               hx-post="{% url 'explorer:'|add:module|add:'_update' %}"
               hx-target="#module-body"
               hx-swap="outerHTML"
               hx-trigger="change, keyup[key=='Enter'] from:body"
               hx-include="[name='{{ name }}']"
               class="input-card-number" />
    </div>
    <input type="range"
           name="{{ name }}_range"
           min="{{ min }}"
           max="{{ max }}"
           step="{{ step }}"
           value="{{ value }}"
           hx-post="{% url 'explorer:'|add:module|add:'_update' %}"
           hx-trigger="input changed delay:80ms from:input[type=range]"
           hx-target="#module-body"
           hx-swap="outerHTML"
           hx-include="[name='{{ name }}'], [name='{{ name }}_range']"
           class="input-card-range" />
</div>
